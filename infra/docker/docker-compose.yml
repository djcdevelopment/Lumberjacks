services:
  postgres:
    image: postgres:16-alpine
    container_name: game-postgres
    environment:
      POSTGRES_DB: game
      POSTGRES_USER: game
      POSTGRES_PASSWORD: game
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: ../..
      target: gateway
    ports:
      - "4000:4000"
    environment:
      Urls: "http://+:4000"
      ConnectionStrings__GameDb: "Host=postgres;Database=game;Username=game;Password=game"
      ServiceUrls__Simulation: "http://simulation:4001"
      ServiceUrls__EventLog: "http://eventlog:4002"
      ServiceUrls__Progression: "http://progression:4003"
    depends_on:
      postgres:
        condition: service_healthy

  simulation:
    build:
      context: ../..
      target: simulation
    ports:
      - "4001:4001"
    environment:
      Urls: "http://+:4001"
      ConnectionStrings__GameDb: "Host=postgres;Database=game;Username=game;Password=game"
      ServiceUrls__EventLog: "http://eventlog:4002"
      ServiceUrls__Progression: "http://progression:4003"
    depends_on:
      postgres:
        condition: service_healthy

  eventlog:
    build:
      context: ../..
      target: eventlog
    ports:
      - "4002:4002"
    environment:
      Urls: "http://+:4002"
      ConnectionStrings__GameDb: "Host=postgres;Database=game;Username=game;Password=game"
    depends_on:
      postgres:
        condition: service_healthy

  progression:
    build:
      context: ../..
      target: progression
    ports:
      - "4003:4003"
    environment:
      Urls: "http://+:4003"
      ConnectionStrings__GameDb: "Host=postgres;Database=game;Username=game;Password=game"
    depends_on:
      postgres:
        condition: service_healthy

  operatorapi:
    build:
      context: ../..
      target: operatorapi
    ports:
      - "4004:4004"
    environment:
      Urls: "http://+:4004"
      ConnectionStrings__GameDb: "Host=postgres;Database=game;Username=game;Password=game"
      ServiceUrls__Gateway: "http://gateway:4000"
      ServiceUrls__Simulation: "http://simulation:4001"
      ServiceUrls__EventLog: "http://eventlog:4002"
      ServiceUrls__Progression: "http://progression:4003"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
