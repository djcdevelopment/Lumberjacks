services:
  postgres:
    image: postgres:16-alpine
    container_name: game-postgres
    environment:
      POSTGRES_DB: game
      POSTGRES_USER: game
      POSTGRES_PASSWORD: game
    ports:
      - "${PGPORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
