events {}

http {
  access_log /dev/stdout;
  error_log /dev/stderr warn;

  upstream gcp_lumberjacks {
    server 8.231.129.249:42317;
  }

  server {
    listen 8080;
    server_name localhost;

    location = / {
      return 302 /community;
    }

    location = /health {
      proxy_pass http://gcp_lumberjacks;
    }

    location = /community {
      proxy_pass http://gcp_lumberjacks;
    }

    location = /roadmap {
      root /usr/share/nginx/html;
      try_files /roadmap.html =404;
    }

    location = /networksense {
      proxy_pass http://gcp_lumberjacks;
    }

    location = /events {
      proxy_pass http://gcp_lumberjacks;
    }

    location = /testing {
      proxy_pass http://gcp_lumberjacks;
    }

    location /api/v0/telemetry/ {
      limit_except GET { deny all; }
      proxy_pass http://gcp_lumberjacks;
    }

    location / {
      return 404;
    }
  }
}
